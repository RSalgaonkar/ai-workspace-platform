apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: ai-workspace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: ghcr.io/your-org/ai-workspace-client:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.example.com/api
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: ai-workspace
spec:
  selector:
    app: client
  ports:
    - port: 3000
      targetPort: 3000
